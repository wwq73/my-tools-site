# Render Blueprint - My Tools Site
# 一键部署配置文件
#
# 如需 Redis：在 Render Dashboard 手动创建 Redis 实例，
# 然后将连接字符串填入后端环境变量 REDIS_URL

services:
  # ========== 后端 API ==========
  - type: web
    name: mytools-backend
    runtime: docker
    branch: master
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mytools-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
    healthCheckPath: /health
    autoDeploy: true

  # ========== 前端静态站点 ==========
  - type: web
    name: mytools-frontend
    runtime: static
    branch: master
    buildCommand: cd frontend && npm install && npx vite build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://mytools-backend.onrender.com

# ========== PostgreSQL ==========
databases:
  - name: mytools-db
    databaseName: mytools
    user: mytools
    plan: free
