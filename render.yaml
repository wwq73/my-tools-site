# Render Blueprint - My Tools Site
# 一键部署配置文件

services:
  # ========== 后端 API ==========
  - type: web
    name: mytools-backend
    runtime: docker
    branch: master
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mytools-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mytools-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
    healthCheckPath: /health
    autoDeploy: true

  # ========== 前端静态站点 ==========
  - type: web
    name: mytools-frontend
    runtime: static
    branch: master
    buildCommand: cd frontend && npm install && npx vite build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://mytools-backend.onrender.com

# ========== 数据库 ==========
databases:
  - name: mytools-db
    databaseName: mytools
    user: mytools
    plan: free

# ========== Redis ==========
redis:
  - name: mytools-redis
    plan: free
